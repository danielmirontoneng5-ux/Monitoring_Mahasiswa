<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up Monitoring Mahasiswa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    overflow:hidden;
}

/* BACKGROUND BULAT */
.circle1{
    position:absolute;
    width:300px;
    height:300px;
    background:#3b82f6;
    border-radius:50%;
    top:-100px;
    left:-100px;
    opacity:0.2;
}

.circle2{
    position:absolute;
    width:250px;
    height:250px;
    background:#2563eb;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    opacity:0.2;
}

/* CARD */
.container{
    position:relative;
    width:420px;
    background:rgba(30,41,59,0.95);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
    z-index:2;
}

/* HEADER */
.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    color:white;
    font-size:32px;
    margin-bottom:8px;
}

.title p{
    color:#94a3b8;
    font-size:14px;
}

/* INPUT */
.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input,
.input-group select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:14px;
}

.input-group input::placeholder{
    color:#cbd5e1;
}

.input-group select{
    cursor:pointer;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
    font-weight:bold;
}

button:hover{
    background:#2563eb;
    transform:scale(1.02);
}

/* LOGIN */
.login{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.login a{
    color:#3b82f6;
    text-decoration:none;
    font-weight:bold;
}

.login a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="container">

    <div class="logo">
        📝
    </div>

    <div class="title">
        <h1>Create Account</h1>
        <p>Daftar Sistem Monitoring Mahasiswa</p>
    </div>

    <form method="POST" action="/signup">

        <div class="input-group">
            <label>Nama Lengkap</label>
            <input 
                type="text" 
                name="nama" 
                placeholder="Masukkan Nama Lengkap"
                required
            >
        </div>

        <div class="input-group">
            <label>Email</label>
            <input 
                type="email" 
                name="email" 
                placeholder="Masukkan Email"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input 
                type="password" 
                name="password" 
                placeholder="Masukkan Password"
                required
            >
        </div>

        <div class="input-group">
            <label>Pilih Role</label>

            <select name="role" required>
                <option value="">-- Pilih Role --</option>
                <option value="mahasiswa">Mahasiswa</option>
                <option value="dosen">Dosen</option>
            </select>
        </div>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <div class="login">
        Sudah punya akun?
        <a href="/">
            Login
        </a>
    </div>

</div>

</body>
</html>
