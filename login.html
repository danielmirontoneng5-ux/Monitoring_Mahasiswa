<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Monitoring Mahasiswa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    width:380px;
    background:#1e293b;
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.title h1{
    font-size:28px;
    margin-bottom:10px;
}

.title p{
    color:#94a3b8;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:white;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

.input-group input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2563eb;
}

.signup{
    margin-top:20px;
    text-align:center;
    color:#cbd5e1;
}

.signup a{
    color:#3b82f6;
    text-decoration:none;
}

.signup a:hover{
    text-decoration:underline;
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:15px;
}

</style>

</head>
<body>

<div class="container">

    <div class="logo">
        🎓
    </div>

    <div class="title">
        <h1>Login</h1>
        <p>Sistem Monitoring Mahasiswa</p>
    </div>

    <form method="POST" action="/">

        <div class="input-group">
            <label>Email</label>
            <input 
                type="email" 
                name="email" 
                placeholder="Masukkan Email"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input 
                type="password" 
                name="password" 
                placeholder="Masukkan Password"
                required
            >
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="signup">
        Belum punya akun?
        <a href="/signup">
            Sign Up
        </a>
    </div>

</div>

</body>
</html>
