<!DOCTYPE html>
<html>
<head>
<title>Data Organisasi Mahasiswa</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th, td{
    padding:12px;
    border-bottom:1px solid #334155;
}

th{
    background:#020617;
}

</style>
</head>

<body>

<h1>Aktivitas Organisasi Mahasiswa</h1>

<table>

<tr>
    <th>Nama</th>
    <th>Kelas</th>
    <th>Organisasi</th>
    <th>Jenis</th>
    <th>Jabatan</th>
    <th>Status</th>
</tr>

{% for d in data %}
<tr>
    <td>{{ d.nama }}</td>
    <td>{{ d.nama_kelas }}</td>
    <td>{{ d.nama_organisasi }}</td>
    <td>{{ d.jenis }}</td>
    <td>{{ d.jabatan }}</td>
    <td>{{ d.status }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
